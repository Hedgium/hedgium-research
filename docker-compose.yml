services:
  research-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hedgium
      POSTGRES_PASSWORD: hedgium
      POSTGRES_DB: hedgium_research
    ports:
      - "5433:5432"
    volumes:
      - research_pg_data:/var/lib/postgresql/data

  research-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  research_pg_data:
